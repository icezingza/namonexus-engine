name: NamoNexus CI

on:
  push:
    branches: [ "main", "develop", "release/**" ]
  pull_request:
    branches: [ "main", "develop" ]

permissions:
  contents: read

jobs:
  # ── Lint & Type Check ─────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install lint tools
        run: |
          pip install --upgrade pip
          pip install ruff black isort

      - name: Run ruff (linting)
        run: ruff check namonexus_fusion/ --ignore E501,W503

      - name: Run black (format check)
        run: black --check namonexus_fusion/ --line-length 100

      - name: Run isort (import order check)
        run: isort --check-only namonexus_fusion/

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install runtime dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit

      - name: Run dependency vulnerability audit
        run: pip-audit -r requirements.txt

  # ── Tests ─────────────────────────────────────────────────────────────────
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Phase 1 tests
        run: pytest namonexus_fusion/tests/test_phase1.py -v --tb=short

      - name: Run Phase 2 tests
        run: pytest namonexus_fusion/tests/test_phase2.py -v --tb=short

      - name: Run Phase 3 tests
        run: pytest namonexus_fusion/tests/test_phase3.py -v --tb=short

      - name: Run Phase 4 tests
        run: pytest namonexus_fusion/tests/test_phase4.py -v --tb=short

      - name: Run all tests with coverage
        run: |
          pytest namonexus_fusion/tests/ \
            --cov=namonexus_fusion \
            --cov-report=xml \
            --cov-report=term-missing \
            --tb=short

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.11'
        with:
          name: coverage-report
          path: coverage.xml

  sbom:
    name: SBOM Generation
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install runtime dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate SBOM
        run: |
          python scripts/generate_sbom.py \
            --requirements requirements.txt \
            --output artifacts/sbom.cdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: artifacts/sbom.cdx.json

  # ── Golden Ratio Invariants Smoke Test ────────────────────────────────────
  phi-invariants:
    name: Golden Ratio Invariants Smoke Test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install package
        run: pip install -e .

      - name: Verify Golden Ratio structural invariants
        run: |
          python - <<'EOF'
          import math
          from namonexus_fusion.core.constants import GOLDEN_RATIO as phi
          from namonexus_fusion import NamoNexusEngine

          tol = 1e-9
          assert abs(phi**2 - phi - 1) < tol,        f"phi^2 = phi+1 failed: {phi**2}"
          assert abs(1/phi + 1/phi**2 - 1) < tol,    f"1/phi + 1/phi^2 = 1 failed"
          assert abs(1/phi - (phi - 1)) < tol,        f"1/phi = phi-1 failed"

          engine = NamoNexusEngine()
          ratio  = engine._alpha0 / engine._beta0
          assert abs(ratio - phi) < tol, f"Prior ratio {ratio} != phi={phi}"

          print(f"All Golden Ratio invariants verified. phi={phi:.10f}")
          EOF

  # ── End-to-End Integration ────────────────────────────────────────────────
  e2e:
    name: End-to-End Integration
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install package
        run: pip install -e .

      - name: Run end-to-end integration test
        run: |
          python - <<'EOF'
          """Full stack integration test."""
          from namonexus_fusion import NamoNexusEngine
          from namonexus_fusion.core import (
              HierarchicalBayesianModel,
              StreamingObservation, InMemoryConnector,
          )

          # 1. Basic fusion
          engine = NamoNexusEngine()
          engine.update_batch([
              {"score": 0.85, "confidence": 0.70, "modality": "text"},
              {"score": 0.25, "confidence": 0.90, "modality": "voice"},
              {"score": 0.60, "confidence": 0.85, "modality": "face"},
          ])
          assert 0.0 < engine.fused_score < 1.0
          assert engine.risk_level() in ("low", "medium", "high", "critical")
          print(f"[OK] Basic fusion: score={engine.fused_score:.4f}")

          # 2. XAI report
          report = engine.explain(metadata={"session_id": "ci_test"})
          assert report.summary_text
          assert len(report.modality_attributions) >= 1
          audit = report.to_dict()
          assert "timestamp" in audit
          print(f"[OK] XAI report: {report.dominant_modality}")

          # 3. Streaming
          engine2 = NamoNexusEngine()
          pipeline = engine2.stream()
          obs = [
              StreamingObservation(score=0.8, confidence=0.9, modality="text"),
              StreamingObservation(score=0.3, confidence=0.7, modality="voice"),
          ]
          results = pipeline.run_sync(InMemoryConnector(obs))
          assert len(results) == 2
          print(f"[OK] Streaming: {len(results)} results")

          # 4. Hierarchical + federated
          model  = HierarchicalBayesianModel()
          engine3 = NamoNexusEngine(hierarchical_model=model, subject_id="test_user")
          engine3.update(0.7, 0.8, "text")
          engine3.commit_session()
          delta = model.export_federated_delta()
          assert delta.alpha_delta >= 0
          print(f"[OK] Federated delta: alpha_delta={delta.alpha_delta:.4f}")

          # 5. Session summary
          summary = engine.session_summary()
          assert "fused_score" in summary
          assert "risk_level"  in summary
          print(f"[OK] Session summary: {list(summary.keys())}")

          print("\n✅ All integration checks passed.")
          EOF
