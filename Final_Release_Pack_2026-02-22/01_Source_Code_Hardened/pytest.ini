[pytest]
# NamoNexus Fusion Engine — Pytest Configuration

# Test discovery
testpaths = namonexus_fusion/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output
addopts =
    -v
    --tb=short
    --strict-markers
    --import-mode=importlib

# Asyncio mode (for streaming pipeline tests)
asyncio_mode = auto

# Markers
markers =
    slow: Tests that take > 2 seconds to run
    integration: Integration tests requiring full stack
    unit: Fast, isolated unit tests
    xai: Phase 4 explainability tests
    hierarchical: Phase 4 hierarchical Bayesian tests
    streaming: Phase 3 streaming pipeline tests
    drift: Phase 3 drift detection tests
    phase1: Phase 1 temporal + empirical prior tests
    phase2: Phase 2 calibration + trust + hyperopt tests

# Logging
log_cli = false
log_level = WARNING
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
